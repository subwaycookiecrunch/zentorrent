name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            name: zt-windows-amd64.exe
          - os: linux
            arch: amd64
            name: zt-linux-amd64
          - os: darwin
            arch: amd64
            name: zt-macos-amd64
          - os: darwin
            arch: arm64
            name: zt-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.name }} .
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          name: ${{ github.ref_name }}

  brew:
    name: publish to homebrew
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: update homebrew formula
        run: |
          sleep 10
          VERSION="${GITHUB_REF_NAME#v}"
          URL_AMD64="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/zt-macos-amd64"
          URL_ARM64="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/zt-macos-arm64"
          
          curl -sL $URL_AMD64 -o zt-amd64
          curl -sL $URL_ARM64 -o zt-arm64
          
          SHA_AMD64=$(sha256sum zt-amd64 | awk '{print $1}')
          SHA_ARM64=$(sha256sum zt-arm64 | awk '{print $1}')
          
          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/zt.rb
          sed -i "s|url .*/zt-macos-amd64\"|url \"$URL_AMD64\"|" Formula/zt.rb
          sed -i "s|url .*/zt-macos-arm64\"|url \"$URL_ARM64\"|" Formula/zt.rb
          
          sed -i "/on_intel do/,/end/ s/sha256 .*/sha256 \"$SHA_AMD64\"/" Formula/zt.rb
          sed -i "/on_arm do/,/end/ s/sha256 .*/sha256 \"$SHA_ARM64\"/" Formula/zt.rb
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "chore: inject brew checksums for ${{ github.ref_name }}" || echo "no changes to formula"
          git push

  winget:
    name: publish to winget
    runs-on: windows-latest
    needs: build
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: subwaycookiecrunch.zt
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
        continue-on-error: true
