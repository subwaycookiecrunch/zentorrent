name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            name: zt-windows-amd64.exe
          - os: linux
            arch: amd64
            name: zt-linux-amd64
          - os: darwin
            arch: amd64
            name: zt-macos-amd64
          - os: darwin
            arch: arm64
            name: zt-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.name }} .
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          name: ${{ github.ref_name }}
